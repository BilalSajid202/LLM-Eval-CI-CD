# LLM pipeline under test — model, retriever, and generation settings
model:
  provider: anthropic
  name: claude-haiku-4-5
  temperature: 0.0
  max_tokens: 1024

retriever:
  type: local
  top_k: 5
  chunk_size: 512

pricing:
  # USD per 1M tokens — used for cost scoring
  input_per_million: 0.80
  output_per_million: 4.00

rag:
  knowledge_base_path: data/knowledge_base
  system_prompt_path: prompts/system_prompt.yaml
